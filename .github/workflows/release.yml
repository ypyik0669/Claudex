name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npx electron-builder --win nsis zip --publish never
          - platform: macos
            os: macos-latest
            command: npx electron-builder --mac dmg zip --x64 --arm64 --publish never

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package desktop app
        run: ${{ matrix.command }}

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: claudex-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.zip
            release/*.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" $(find artifacts -type f | sort) \
            --title "Claudex ${TAG_NAME}" \
            --notes-file RELEASE_NOTES.md \
            --latest \
            --verify-tag
